
name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # CHECKOUT
      - name: Checkout
        uses: actions/checkout@v4

      # SYSTEM DEPENDENCIES
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          git zip unzip \
          python3-pip build-essential \
          openjdk-17-jdk

      # PYTHON
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install cython kivy buildozer

      # CLEAN (çox vacib)
      - name: Clean environment
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.android

      # 🔥 CRITICAL FIX: LICENSE FORCE (bu əsas həll)
      - name: Accept Android licenses manually
        run: |
          mkdir -p ~/.android
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> ~/.android/android-sdk-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> ~/.android/android-sdk-license

      # BUILD
      - name: Build APK
        run: buildozer -v android debug

      # UPLOAD
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KnovYourFrend-APK
          path: bin/*.apk
