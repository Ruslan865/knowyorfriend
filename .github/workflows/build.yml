name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git zip unzip openjdk-17-jdk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython kivy

      # 🔥 CRITICAL: CLEAN EVERYTHING
      - name: Clean environment
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.android

      # 🔥 CRITICAL: LICENSE FIX
      - name: Force accept licenses
        run: |
          mkdir -p ~/.android
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> ~/.android/android-sdk-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> ~/.android/android-sdk-license

      # 🔥 BUILD
      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

